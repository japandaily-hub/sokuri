# Render Blueprint — ソクウリ AssetWise バックエンド
#
# Render Web Service (FastAPI on Docker) + Managed PostgreSQL の一発プロビジョニング。
# Railway デプロイ問題からの移行用。
#
# 使い方:
#   1. Render dashboard → New → Blueprint
#   2. このリポジトリを選択（japandaily-hub/sokuri）
#   3. Render が本ファイルを読み取り、サービスと DB を一括作成
#   4. GOOGLE_API_KEY は dashboard で手動入力（sync: false のため）

databases:
  - name: sokuri-db
    databaseName: sokuri
    user: sokuri
    plan: free          # ⚠️ Free PostgreSQL は【作成後30日で期限切れ→接続不能】+14日猶予後に
                        #    データごと削除される（render.com/docs/free）。旧コメント「90日無期限」は
                        #    誤り。本番継続には期限前に有料化 or 外部PG移行 or 定期再作成が必須。
    region: oregon
    ipAllowList: []     # 内部接続のみ（Render Web Service からの接続を許可）

services:
  - type: web
    name: sokuri-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # 750 時間/月 (1 instance ≒ 24/7 動作可能)
    region: oregon      # databases と同一 region 必須（内部接続のため）
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    # 起動コマンドは Dockerfile の CMD = /app/start.sh を採用する。
    # （Render の dockerCommand に sh -c "..." を渡すと argv 解釈が壊れ
    #   exit 127: "alembic upgrade head && uvicorn ...: not found" になるため）
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sokuri-db
          property: connectionString   # postgres:// 形式（backend で asyncpg 化）
      - key: GOOGLE_API_KEY
        sync: false                    # dashboard で手動入力（git 漏洩防止）
      - key: PORT
        value: 8000
      - key: SQL_ECHO
        value: "false"
      # ── カタヅケ クローズドβ ──────────────────────────────────
      - key: JWT_SECRET
        generateValue: true            # Render が安全なランダム値を自動生成
      - key: ADMIN_EMAILS
        value: "ko.13.hei@gmail.com,ko.13.hei+kdzadmin@gmail.com"   # 後者は動作検証用probe管理者（gmailエイリアス）
      - key: STORAGE_DIR
        value: /tmp/uploads            # Free plan はエフェメラル（β許容）
      - key: BREVO_API_KEY
        sync: false                    # dashboard で手動入力（未設定なら送信スキップ）
      - key: MAIL_FROM
        value: "noreply@katadzuke.jp"
      - key: FRONTEND_BASE_URL
        value: "https://sokuri.vercel.app"
      - key: APP_ENV
        value: production              # 本番起動ガード（JWT_SECRET未設定時に起動失敗させる）を有効化
      - key: ALLOWED_ORIGINS
        value: "https://sokuri.vercel.app"   # CORS許可オリジン（カンマ区切り、未設定時は"*"にしない）。
                                              # 未設定時は FRONTEND_BASE_URL + localhost にフォールバック（config.py 参照）
      - key: DIAG_TOKEN
        sync: false            # /readyz の詳細診断(マイグレーション失敗ログ末尾)の閲覧トークン。
                                # 未設定=β運用: スキーマ未達の間のみ誰でも閲覧可(URLリダクト済)。
                                # 正式リリース時はランダム値を設定し ?token=<値> で閲覧する。
      - key: APP_ENCRYPTION_KEY
        sync: false            # dashboard で手動入力（git 漏洩防止）。未設定時は機微データ暗号化(Fernet)を
                                # 使うリクエストがEncryptionKeyMissingError→500になる（プロセスは落ちない。
                                # app/core/crypto.py はハンドラ内で送出しFastAPIが500に変換する）。
                                # 生成: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # ── 認証系レート制限 ──────────────────────────────────────
      - key: RATE_LIMIT_ENABLED
        value: "true"          # 緊急無効化スイッチ。障害時は "false" に変更して再デプロイ。
      - key: TRUSTED_PROXY_HOPS
        value: "3"             # X-Forwarded-For の右から何番目を信頼するか。
                                # 2026-07-18 に本番実測して確定した値。実際の連鎖は3段:
                                #   client → Cloudflare(162.159.x/172.6x.x) → Render内部(10.x)
                                # hops=1 だと末尾の Render 内部プライベートIPを掴み、
                                # 全ユーザーが同一バケット＝認証全断のモードに入る
                                # （現在は client_ip.is_private_or_loopback により
                                #   IP軸スキップへ退避するので全断はしないが、IP軸の保護が失われる）。
                                # 実測は /api/v1/_diag/client-ip で行い、resolved_ip が
                                # 自分の実グローバルIPと一致することを必ず確認すること。
                                # 過大にすると偽装可能、過小にすると全ユーザーが同一IP扱いになる。
