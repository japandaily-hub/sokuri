<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>プロフィール編集｜カタヅケ</title>
<meta name="theme-color" content="#1f54de">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="katazuke-main.css">
<style>
body { background: #f4f6fb; }
.edit-header {
  background: #fff; border-bottom: 1px solid var(--line);
  padding: 0 20px; height: 60px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 60;
}
.edit-header img { height: 36px; }
.edit-header-back {
  margin-left: auto; display: flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 700; color: var(--body-soft); text-decoration: none; transition: color .2s;
}
.edit-header-back:hover { color: var(--blue); }
.edit-header-back svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

.edit-wrap { max-width: 560px; margin: 0 auto; padding: 24px 20px 80px; }
.edit-section-title {
  font-family: var(--head); font-size: 14px; font-weight: 700; color: var(--navy);
  margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.edit-section-title svg { width: 16px; height: 16px; fill: none; stroke: var(--blue); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.form-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-s); border: 1px solid var(--line-soft); padding: 22px 20px; margin-bottom: 16px; }

/* フィールド */
.field { margin-bottom: 18px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 7px; }
.field label .req { font-size: 10px; font-weight: 700; color: #fff; background: var(--blue); padding: 1px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
.field label .opt { font-size: 10px; color: var(--body-soft); background: var(--line-soft); padding: 1px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
.field input, .field select, .field textarea {
  width: 100%; font-family: var(--sans); font-size: 15px; color: var(--ink);
  background: #fafbfe; border: 1.5px solid var(--line); border-radius: var(--radius-s);
  padding: 12px 14px; outline: none; transition: border-color .2s, box-shadow .2s; appearance: none;
}
.field input::placeholder, .field textarea::placeholder { color: #bcc3d4; }
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px rgba(31,84,222,.12);
}
.has-error input, .has-error select { border-color: #e05c5c !important; }
.field-error { font-size: 12px; color: #e05c5c; margin-top: 5px; display: none; }
.field-hint { font-size: 12px; color: var(--body-soft); margin-top: 5px; line-height: 1.6; }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* アバター */
.avatar-row { display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }
.avatar-circle {
  width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
  background: var(--blue); color: #fff; font-family: var(--head);
  font-size: 28px; font-weight: 900; display: grid; place-items: center;
  position: relative; cursor: pointer;
}
.avatar-edit-badge {
  position: absolute; bottom: 0; right: 0;
  width: 22px; height: 22px; border-radius: 50%; background: #fff;
  border: 2px solid var(--line); display: grid; place-items: center;
}
.avatar-edit-badge svg { width: 11px; height: 11px; fill: none; stroke: var(--body-soft); stroke-width: 2; stroke-linecap: round; }
.avatar-info strong { display: block; font-family: var(--head); font-size: 14px; font-weight: 700; color: var(--navy); }
.avatar-info span { font-size: 12.5px; color: var(--body-soft); }
.btn-avatar { font-size: 12.5px; font-weight: 700; color: var(--blue); background: none; border: 1.5px solid var(--blue); border-radius: 99px; padding: 6px 14px; cursor: pointer; margin-top: 6px; transition: .2s; }
.btn-avatar:hover { background: var(--blue); color: #fff; }

/* エリアチップ */
.area-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.area-chip {
  border: 1.5px solid var(--line); border-radius: 9px; padding: 9px 6px; text-align: center;
  cursor: pointer; font-family: var(--head); font-size: 12.5px; font-weight: 700; color: var(--ink);
  transition: .2s; user-select: none;
}
.area-chip:hover { border-color: var(--blue); color: var(--blue); }
.area-chip.selected { border-color: var(--blue); background: var(--blue); color: #fff; }

/* パスワード */
.pw-wrap { position: relative; }
.pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--body-soft); padding: 4px; }
.pw-toggle svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; display: block; }
.pw-wrap input { padding-right: 42px; }

/* 保存バー */
.save-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(255,255,255,.96); backdrop-filter: blur(10px);
  border-top: 1px solid var(--line); padding: 12px 20px;
  box-shadow: 0 -6px 24px -12px rgba(15,37,82,.2);
}
.save-bar-inner { max-width: 560px; margin: 0 auto; display: flex; gap: 10px; align-items: center; }
.save-changed { font-size: 13px; color: var(--body-soft); flex: 1; font-weight: 600; }
.save-changed.dirty { color: var(--blue); }

/* トースト */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--navy); color: #fff; font-family: var(--head); font-size: 14px; font-weight: 700;
  padding: 13px 22px; border-radius: 99px; z-index: 200;
  box-shadow: 0 8px 24px -8px rgba(15,37,82,.5);
  display: none; align-items: center; gap: 8px; white-space: nowrap;
}
.toast.show { display: flex; }
@keyframes fadeOut { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin .7s linear infinite; display: inline-block; }

@media(max-width:480px) {
  .row-2 { grid-template-columns: 1fr; }
  .area-grid { grid-template-columns: repeat(2,1fr); }
  .edit-wrap { padding: 16px 14px 90px; }
  .form-card { padding: 18px 14px; }
  .save-bar-inner { gap: 8px; }
  .save-bar-inner .btn { padding: 11px 16px; font-size: 13.5px; }
  .avatar-circle { width: 60px; height: 60px; font-size: 24px; }
}
@media(max-width:360px) {
  .area-grid { grid-template-columns: repeat(2,1fr); gap: 6px; }
  .save-changed { display: none; }
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-user" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></symbol>
  <symbol id="i-bell" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7"/></symbol>
  <symbol id="i-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
</defs></svg>

<header class="edit-header">
  <a href="カタヅケ.html"><img src="img/logo-katazuke.png" alt="カタヅケ"></a>
  <a href="マイページ.html" class="edit-header-back">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
    マイページ
  </a>
</header>

<main>
<div class="edit-wrap">

  <!-- アバター -->
  <div class="form-card">
    <div class="avatar-row">
      <div class="avatar-circle" id="avatar-circle">
        山
        <div class="avatar-edit-badge"><svg viewBox="0 0 24 24"><use href="#i-edit"></use></svg></div>
      </div>
      <div class="avatar-info">
        <strong>山田 花子</strong>
        <span>プロフィール画像</span><br>
        <button class="btn-avatar" id="btn-avatar">画像を変更</button>
      </div>
    </div>
  </div>

  <!-- 基本情報 -->
  <div class="edit-section-title"><svg viewBox="0 0 24 24"><use href="#i-user"></use></svg>基本情報</div>
  <div class="form-card">
    <div class="row-2">
      <div class="field" id="f-sei">
        <label>姓<span class="req">必須</span></label>
        <input type="text" id="inp-sei" value="山田" placeholder="山田">
        <div class="field-error">姓を入力してください</div>
      </div>
      <div class="field" id="f-mei">
        <label>名<span class="req">必須</span></label>
        <input type="text" id="inp-mei" value="花子" placeholder="花子">
        <div class="field-error">名を入力してください</div>
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>セイ<span class="opt">任意</span></label>
        <input type="text" value="ヤマダ" placeholder="ヤマダ">
      </div>
      <div class="field">
        <label>メイ<span class="opt">任意</span></label>
        <input type="text" value="ハナコ" placeholder="ハナコ">
      </div>
    </div>
    <div class="field" id="f-phone">
      <label>電話番号<span class="opt">任意</span></label>
      <input type="tel" id="inp-phone" value="090-1234-5678" placeholder="090-0000-0000" inputmode="tel">
      <div class="field-hint">訪問日程調整時の連絡に使用します</div>
    </div>
    <div class="field">
      <label>メールアドレス</label>
      <input type="email" value="hanako@example.com" disabled style="background:var(--line-soft);color:var(--body-soft);cursor:not-allowed;">
      <div class="field-hint">メールアドレスの変更はサポートまでお問い合わせください</div>
    </div>
  </div>

  <!-- エリア -->
  <div class="edit-section-title"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>お住まいのエリア</div>
  <div class="form-card">
    <div class="area-grid" id="area-grid">
      <div class="area-chip selected" data-area="tokyo">東京都</div>
      <div class="area-chip" data-area="kanagawa">神奈川県</div>
      <div class="area-chip" data-area="saitama">埼玉県</div>
      <div class="area-chip" data-area="chiba">千葉県</div>
      <div class="area-chip" data-area="osaka">大阪府</div>
      <div class="area-chip" data-area="aichi">愛知県</div>
      <div class="area-chip" data-area="fukuoka">福岡県</div>
      <div class="area-chip" data-area="other">その他</div>
    </div>
  </div>

  <!-- 通知設定 -->
  <div class="edit-section-title"><svg viewBox="0 0 24 24"><use href="#i-bell"></use></svg>通知設定</div>
  <div class="form-card">
    <div style="display:flex;flex-direction:column;gap:0;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line-soft);">
        <div><div style="font-size:14px;font-weight:700;color:var(--navy);">入札が届いたとき</div><div style="font-size:12px;color:var(--body-soft);margin-top:2px;">LINE通知</div></div>
        <label class="publish-toggle" style="position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;"><input type="checkbox" checked><span style="position:absolute;inset:0;border-radius:99px;background:var(--green);cursor:pointer;transition:.3s;"><span style="position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.3s;transform:translateX(20px);box-shadow:0 1px 4px rgba(0,0,0,.2);"></span></span></label>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line-soft);">
        <div><div style="font-size:14px;font-weight:700;color:var(--navy);">メッセージが届いたとき</div><div style="font-size:12px;color:var(--body-soft);margin-top:2px;">メール通知</div></div>
        <label class="publish-toggle" style="position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;"><input type="checkbox" checked><span style="position:absolute;inset:0;border-radius:99px;background:var(--green);cursor:pointer;transition:.3s;"><span style="position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.3s;transform:translateX(20px);box-shadow:0 1px 4px rgba(0,0,0,.2);"></span></span></label>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 0;">
        <div><div style="font-size:14px;font-weight:700;color:var(--navy);">お知らせ・キャンペーン</div><div style="font-size:12px;color:var(--body-soft);margin-top:2px;">メール通知</div></div>
        <label class="publish-toggle" style="position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;"><input type="checkbox"><span style="position:absolute;inset:0;border-radius:99px;background:var(--line);cursor:pointer;transition:.3s;"><span style="position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2);"></span></span></label>
      </div>
    </div>
  </div>

  <!-- パスワード変更 -->
  <div class="edit-section-title"><svg viewBox="0 0 24 24"><use href="#i-lock"></use></svg>パスワード変更</div>
  <div class="form-card">
    <div class="field">
      <label>現在のパスワード</label>
      <div class="pw-wrap">
        <input type="password" id="inp-pw-cur" placeholder="現在のパスワード">
        <button type="button" class="pw-toggle" data-target="inp-pw-cur"><svg viewBox="0 0 24 24"><path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <div class="field">
      <label>新しいパスワード<span class="opt">8文字以上</span></label>
      <div class="pw-wrap">
        <input type="password" id="inp-pw-new" placeholder="新しいパスワード">
        <button type="button" class="pw-toggle" data-target="inp-pw-new"><svg viewBox="0 0 24 24"><path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <div class="field">
      <label>新しいパスワード（確認）</label>
      <div class="pw-wrap">
        <input type="password" id="inp-pw-conf" placeholder="もう一度入力">
        <button type="button" class="pw-toggle" data-target="inp-pw-conf"><svg viewBox="0 0 24 24"><path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <button class="btn btn-ghost" style="width:100%;margin-top:2px;" id="btn-change-pw">パスワードを変更する</button>
  </div>

  <!-- 危険ゾーン -->
  <div style="margin-top:8px;padding:18px 20px;border:1.5px solid #ffd0d0;border-radius:var(--radius);background:#fff;">
    <div style="font-family:var(--head);font-size:14px;font-weight:700;color:#cc3333;margin-bottom:8px;">アカウントの削除</div>
    <div style="font-size:13px;color:var(--body-soft);line-height:1.75;margin-bottom:14px;">アカウントを削除すると、すべての出品データ・メッセージ・取引履歴が完全に消去されます。この操作は取り消せません。</div>
    <a href="退会・アカウント削除.html" style="font-size:13px;font-weight:700;color:#cc3333;text-decoration:underline;text-underline-offset:3px;">アカウントを削除する →</a>
  </div>
</div>
</main>

<!-- 保存バー -->
<div class="save-bar">
  <div class="save-bar-inner">
    <span class="save-changed" id="save-status">変更なし</span>
    <button class="btn btn-ghost" onclick="window.location.href='マイページ.html'">キャンセル</button>
    <button class="btn btn-primary" id="btn-save">変更を保存</button>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast">
  <svg style="width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;flex-shrink:0;" viewBox="0 0 24 24"><use href="#i-check"></use></svg>
  プロフィールを保存しました
</div>

<script>
(function(){
  var dirty = false;

  /* 変更検知 */
  document.querySelectorAll('input:not([disabled]), select, textarea').forEach(function(el){
    el.addEventListener('input', function(){ markDirty(); });
    el.addEventListener('change', function(){ markDirty(); });
  });
  function markDirty(){
    dirty = true;
    var s = document.getElementById('save-status');
    s.textContent = '未保存の変更があります';
    s.classList.add('dirty');
  }

  /* エリア選択 */
  document.querySelectorAll('.area-chip').forEach(function(c){
    c.addEventListener('click', function(){
      document.querySelectorAll('.area-chip').forEach(function(x){ x.classList.remove('selected'); });
      c.classList.add('selected');
      markDirty();
    });
  });

  /* パスワード表示 */
  document.querySelectorAll('.pw-toggle').forEach(function(btn){
    var show = false;
    btn.addEventListener('click', function(){
      show = !show;
      var inp = document.getElementById(btn.dataset.target);
      if(inp) inp.type = show ? 'text' : 'password';
    });
  });

  /* 保存 */
  document.getElementById('btn-save').addEventListener('click', function(){
    var sei = document.getElementById('inp-sei').value.trim();
    var mei = document.getElementById('inp-mei').value.trim();
    if(!sei || !mei){ return; }
    this.innerHTML = '<span class="spinning">↻</span>';
    this.disabled = true;
    setTimeout(function(){
      document.getElementById('btn-save').innerHTML = '変更を保存';
      document.getElementById('btn-save').disabled = false;
      document.getElementById('save-status').textContent = '保存済み';
      document.getElementById('save-status').classList.remove('dirty');
      dirty = false;
      var t = document.getElementById('toast');
      t.classList.add('show');
      t.style.animation = 'fadeOut 2.5s ease forwards';
      setTimeout(function(){ t.classList.remove('show'); t.style.animation = ''; }, 2500);
    }, 800);
  });

  /* パスワード変更 */
  document.getElementById('btn-change-pw').addEventListener('click', function(){
    var cur = document.getElementById('inp-pw-cur').value;
    var nw = document.getElementById('inp-pw-new').value;
    var cf = document.getElementById('inp-pw-conf').value;
    var btn = this;
    /* インラインエラー表示 */
    var errEl = document.getElementById('pw-change-error');
    if(!errEl){
      errEl = document.createElement('div');
      errEl.id = 'pw-change-error';
      errEl.style.cssText = 'font-size:12.5px;color:#e05c5c;margin-bottom:10px;padding:10px 14px;background:#fff3f3;border-radius:9px;border:1px solid #ffc0c0;';
      btn.parentNode.insertBefore(errEl, btn);
    }
    errEl.style.display = 'none';
    if(!cur){ errEl.textContent = '現在のパスワードを入力してください'; errEl.style.display='block'; return; }
    if(nw.length < 8){ errEl.textContent = '新しいパスワードは8文字以上で設定してください'; errEl.style.display='block'; return; }
    if(nw !== cf){ errEl.textContent = '新しいパスワードが一致しません'; errEl.style.display='block'; return; }
    btn.innerHTML = '<span class="spinning">↻</span> 変更中…';
    btn.disabled = true;
    setTimeout(function(){
      btn.textContent = 'パスワードを変更しました ✓';
      btn.style.color = 'var(--green)';
      document.getElementById('inp-pw-cur').value = '';
      document.getElementById('inp-pw-new').value = '';
      document.getElementById('inp-pw-conf').value = '';
    }, 800);
  });
})();
</script>
</body>
</html>
