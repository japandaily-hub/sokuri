<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ログイン｜カタヅケ</title>
<meta name="theme-color" content="#1f54de">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="katazuke-main.css">
<style>
body { background: #f4f6fb; min-height: 100vh; }

/* ── 上部バー ── */
.auth-bar {
  background: #fff;
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.auth-bar img { height: 42px; }
.auth-bar-link { font-size: 13px; font-weight: 600; color: var(--body-soft); transition: color .2s; }
.auth-bar-link:hover { color: var(--blue); }

/* ── ラッパー ── */
.auth-wrap {
  max-width: 440px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* ── カード ── */
.auth-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: 0 4px 32px -8px rgba(15,37,82,.16), 0 1px 4px rgba(15,37,82,.06);
  padding: 36px 32px 32px;
  border: 1px solid var(--line-soft);
}
.auth-head { margin-bottom: 28px; }
.auth-title {
  font-family: var(--head);
  font-size: 24px;
  font-weight: 900;
  color: var(--navy);
  line-height: 1.25;
}
.auth-sub {
  font-size: 13.5px;
  color: var(--body-soft);
  line-height: 1.75;
  margin-top: 8px;
}

/* ── 区切り ── */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--body-soft);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
}
.auth-divider::before,
.auth-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}

/* ── フォームフィールド（出品登録と同系統） ── */
.field { margin-bottom: 18px; }
.field:last-child { margin-bottom: 0; }
.field-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 7px;
}
.field label, .field .field-lbl {
  display: block;
  font-size: 13.5px;
  font-weight: 700;
  color: var(--ink);
}
.forget-link {
  font-size: 12px;
  color: var(--blue);
  font-weight: 600;
}
.forget-link:hover { text-decoration: underline; }
.field input {
  width: 100%;
  font-family: var(--sans);
  font-size: 15px;
  color: var(--ink);
  background: #fafbfe;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-s);
  padding: 12px 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field input::placeholder { color: #bcc3d4; }
.field input:focus {
  border-color: var(--blue);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(31,84,222,.12);
}
.has-error input { border-color: #e05c5c !important; }
.field-error {
  font-size: 12px;
  color: #e05c5c;
  margin-top: 5px;
  display: none;
}

/* パスワード表示切替 */
.pw-wrap { position: relative; }
.pw-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--body-soft);
  padding: 4px;
  line-height: 1;
  transition: color .2s;
}
.pw-toggle:hover { color: var(--navy); }
.pw-toggle svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; display: block; }
.pw-wrap input { padding-right: 44px; }

/* エラーバナー */
.auth-error {
  background: #fff3f3;
  border: 1px solid #ffc0c0;
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px;
  color: #cc3333;
  margin-bottom: 18px;
  display: none;
  align-items: center;
  gap: 8px;
  line-height: 1.5;
}
.auth-error.show { display: flex; }

/* 信頼行 */
.trust-row {
  display: flex;
  gap: 18px;
  margin-top: 22px;
  justify-content: center;
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--body-soft);
  font-weight: 600;
}
.trust-item svg { width: 13px; height: 13px; fill: none; stroke: var(--green); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

/* 新規登録誘導 */
.auth-switch {
  text-align: center;
  margin-top: 24px;
  font-size: 13.5px;
  color: var(--body-soft);
  line-height: 1.8;
}
.auth-switch a { color: var(--blue); font-weight: 700; }
.auth-switch a:hover { text-decoration: underline; }

/* LINEボタン */
.btn-line-auth {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #06c755;
  color: #fff;
  border: none;
  border-radius: 99px;
  padding: 16px 20px;
  font-family: var(--head);
  font-size: 15.5px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 10px 22px -8px rgba(6,199,85,.55);
  transition: background .2s, transform .2s, box-shadow .2s;
}
.btn-line-auth:hover {
  background: #05b34c;
  transform: translateY(-2px);
  box-shadow: 0 14px 28px -8px rgba(6,199,85,.6);
}
.btn-line-auth svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

/* ローディングスピナー */
@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin .7s linear infinite; display: inline-block; }

@media(max-width: 480px) {
  .auth-card { padding: 24px 18px; }
  .auth-wrap { padding-top: 20px; padding-left: 14px; padding-right: 14px; }
  .auth-title { font-size: 21px; }
  .trust-row { gap: 10px; flex-wrap: wrap; justify-content: center; }
  .trust-item { font-size: 10.5px; gap: 4px; }
  .btn-line-auth { font-size: 14px; padding: 14px 18px; }
}
@media(max-width: 360px) {
  .trust-row { gap: 8px; }
  .trust-item:last-child { display: none; }
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/><path d="M9 12l2 2 4-4"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></symbol>
</defs></svg>

<!-- 上部バー -->
<header class="auth-bar">
  <a href="カタヅケ.html"><img src="img/logo-katazuke.png" alt="カタヅケ"></a>
  <a href="新規登録.html" class="auth-bar-link">新規登録はこちら →</a>
</header>

<main>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <h1 class="auth-title">ログイン</h1>
      <p class="auth-sub">入札状況や業者との交渉はログイン後に確認できます</p>
    </div>

    <!-- LINEログイン -->
    <button class="btn-line-auth" id="btn-line-login">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.1 2 11.1c0 4.5 3.6 8.3 8.5 9-.3.8-.4 2-.4 2s-.1.7.4.9c.5.2 1-.2 1-.2s2.7-1.8 3.8-2.5c.4.1.9.1 1.3.1C17.7 20.4 22 16.4 22 11.1 22 6.1 17.5 2 12 2z"/></svg>
      LINEで続ける
    </button>

    <div class="auth-divider">メールアドレスで続ける</div>

    <!-- エラーバナー -->
    <div class="auth-error" id="auth-error">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:#cc3333;stroke-width:2;stroke-linecap:round;flex-shrink:0;"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      メールアドレスまたはパスワードが正しくありません
    </div>

    <!-- メールフォーム -->
    <form id="login-form" novalidate>
      <div class="field" id="f-email">
        <label for="inp-email">メールアドレス</label>
        <input type="email" id="inp-email" placeholder="example@email.com" autocomplete="email" inputmode="email">
        <div class="field-error">メールアドレスを正しく入力してください</div>
      </div>
      <div class="field" id="f-pw">
        <div class="field-top">
          <span class="field-lbl">パスワード</span>
          <a href="#" class="forget-link" id="btn-forget">パスワードを忘れた方</a>
        </div>
        <div class="pw-wrap">
          <input type="password" id="inp-pw" placeholder="8文字以上" autocomplete="current-password">
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="パスワードを表示/非表示">
            <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field-error">パスワードを入力してください</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:4px;" id="btn-login">ログイン</button>
    </form>

    <!-- 信頼行 -->
    <div class="trust-row">
      <div class="trust-item">
        <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/><path d="M9 12l2 2 4-4"/></svg>
        SSL暗号化通信
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
        プライバシー保護
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
        無料ログイン
      </div>
    </div>
  </div>

  <!-- 新規登録誘導 -->
  <div class="auth-switch">
    アカウントをお持ちでない方は<br>
    <a href="新規登録.html">無料で新規登録する →</a>
  </div>
</div>
</main>

<!-- パスワードリセットモーダル -->
<div id="reset-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,37,82,.45);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:var(--radius);max-width:400px;width:100%;padding:32px 28px;box-shadow:var(--shadow-l);">
    <h2 style="font-family:var(--head);font-size:20px;color:var(--navy);margin-bottom:8px;">パスワードをリセット</h2>
    <p style="font-size:13.5px;color:var(--body-soft);line-height:1.75;margin-bottom:22px;">登録したメールアドレスにリセット用URLを送信します</p>
    <div class="field">
      <label>メールアドレス</label>
      <input type="email" id="reset-email" placeholder="example@email.com">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-ghost" style="flex:1;" id="reset-cancel">キャンセル</button>
      <button class="btn btn-primary" style="flex:1;" id="reset-send">送信する</button>
    </div>
  </div>
</div>

<script>
(function(){
  /* パスワード表示切替 */
  var eyeIcon = document.getElementById('eye-icon');
  var pwInput = document.getElementById('inp-pw');
  var pwVisible = false;
  document.getElementById('pw-toggle').addEventListener('click', function(){
    pwVisible = !pwVisible;
    pwInput.type = pwVisible ? 'text' : 'password';
    eyeIcon.innerHTML = pwVisible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-7-11-7a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 7 11 7a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
  });

  /* バリデーション */
  function showError(fieldId, show){
    var f = document.getElementById(fieldId);
    f.classList.toggle('has-error', show);
    f.querySelector('.field-error').style.display = show ? 'block' : 'none';
  }

  /* フォーム送信 */
  document.getElementById('login-form').addEventListener('submit', function(e){
    e.preventDefault();
    var email = document.getElementById('inp-email').value.trim();
    var pw = document.getElementById('inp-pw').value;
    var ok = true;
    document.getElementById('auth-error').classList.remove('show');
    if(!email || !email.includes('@')){ showError('f-email', true); ok = false; } else { showError('f-email', false); }
    if(!pw || pw.length < 8){ showError('f-pw', true); ok = false; } else { showError('f-pw', false); }
    if(!ok) return;

    var btn = document.getElementById('btn-login');
    btn.innerHTML = '<span class="spinning">↻</span> ログイン中…';
    btn.disabled = true;
    /* デモ：1秒後に遷移 */
    setTimeout(function(){
      window.location.href = '申し込み状況.html';
    }, 1000);
  });

  /* LINEログイン（デモ） */
  document.getElementById('btn-line-login').addEventListener('click', function(){
    this.innerHTML = '<span class="spinning">↻</span> LINE 認証中…';
    this.disabled = true;
    setTimeout(function(){ window.location.href = '申し込み状況.html'; }, 1200);
  });

  /* パスワードリセット */
  var overlay = document.getElementById('reset-overlay');
  document.getElementById('btn-forget').addEventListener('click', function(e){
    e.preventDefault();
    overlay.style.display = 'flex';
  });
  document.getElementById('reset-cancel').addEventListener('click', function(){
    overlay.style.display = 'none';
  });
  document.getElementById('reset-send').addEventListener('click', function(){
    var e = document.getElementById('reset-email').value.trim();
    if(!e){ return; }
    overlay.style.display = 'none';
    /* デモメッセージ */
    var notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-family:var(--head);font-size:14px;font-weight:700;padding:14px 22px;border-radius:99px;z-index:200;box-shadow:0 8px 24px -8px rgba(15,37,82,.5);';
    notice.textContent = 'リセットメールを送信しました';
    document.body.appendChild(notice);
    setTimeout(function(){ notice.remove(); }, 3000);
  });
  overlay.addEventListener('click', function(e){ if(e.target === overlay) overlay.style.display = 'none'; });
})();
</script>
</body>
</html>
